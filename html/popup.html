<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Open Selected Links</title>
    <script type="module" src="/src/common/extract-links.ts"></script>
    <script type="module" src="/src/popup/index.ts" defer></script>
  </head>
  <body>
    <div id="error"></div>
    <div id="error_sub"></div>
    <form name="SelectLinks">
      <div id="hamburger-row">
        <div id="hamburger">
          <div></div>
          <div></div>
          <div></div>
        </div>
        <div id="hamburger-caption">Tap to hide options</div>
      </div>
      <div id="config-container">
        <fieldset>
          <div id="filter" contenteditable="plaintext-only" placeholder="Filter links (regexp)"></div>
          <div id="filter-options-row">
            <div id="filter-urls-ui">
              <input id="filter-urls-checkbox" type="checkbox">
              <label for="filter-urls-checkbox">Match URLs</label>
            </div>
            <div id="hide-duplicates-ui">
              <input id="hide-duplicates-checkbox" type="checkbox">
              <label for="hide-duplicates-checkbox">Hide duplicates</label>
            </div>
            <button type="button" id="toggle-button">Toggle visible</button>
          </div>
        </fieldset>
        <fieldset>
          <div id="target-window-ui">
            <input id="new-window-checkbox" type="checkbox" checked>
            <label for="new-window-checkbox">New window</label>
          </div>
          <div id="tab-group-ui">
            <label for="tab-group-name">Tab group:</label>
            <input id="tab-group-name" type="text" placeholder="Choose existing or enter new name" list="tab-group-list">
            <datalist id="tab-group-list">
              <option value="-1">None</option>
            </datalist>
          </div>
          <div id="target-discard-ui">
            <input id="discard-tab-checkbox" type="checkbox">
            <label for="discard-tab-checkbox">Snooze tabs</label>
          </div>
          <div id="target-deduplicate-ui">
            <input id="deduplicate-links-checkbox" type="checkbox">
            <label for="deduplicate-links-checkbox">Deduplicate</label>
          </div>
          <div id="target-focus-ui">
            <input id="focus-checkbox" type="checkbox">
            <label for="focus-checkbox">Focus opened tab/window</label>
            <span class="option-note">(new windows may appear in front even when off)</span>
          </div>
          <div id="target-sxs">
            <input id="sxs-checkbox" type="checkbox">
            <label for="sxs-checkbox">Side-by-side, first link on left</label>
          </div>
          <div id="target-display" class="invisible">
            <label for="display">Screen:</label>
            <select id="display" disabled>
              <option value="default">Default</option>
            </select>
          </div>
        </fieldset>
      </div>

      <div class="links-header">Links</div>
      <div id="select-links-div"></div>

      <div id="open-button-display">
        <button type="button" id="open-button">Open</button>
      </div>
    </form>
  </body>
</html>
